name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run ingestion tests
        working-directory: apps/ingestion-service
        run: pytest tests/test_api.py
      - name: Run processing tests
        working-directory: apps/processing-service
        run: pytest tests/test_api.py
      - name: Run query tests
        working-directory: apps/query-service
        run: pytest tests/test_api.py
      - name: Run ai-rca tests
        working-directory: apps/ai-rca-service
        run: pytest tests/test_api.py
